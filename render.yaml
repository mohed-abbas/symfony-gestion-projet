# Blueprint Render : service web (Docker/FrankenPHP) + base Postgres managée.
# Déploiement : dashboard Render → New → Blueprint → sélectionner ce dépôt.
databases:
  - name: taskflow-db
    databaseName: app
    user: app
    plan: free

services:
  - type: web
    name: taskflow
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /login
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      # Généré une fois par Render, persistant.
      - key: APP_SECRET
        generateValue: true
      # URL de connexion interne de la base ci-dessus (injectée automatiquement).
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      # La base Render est en Postgres 18 ; l'URL auto-injectée ne porte pas serverVersion.
      - key: DATABASE_SERVER_VERSION
        value: "18"
      - key: MESSENGER_TRANSPORT_DSN
        value: doctrine://default
      # Géré dans le dashboard (secret, non versionné) pour ne pas être écrasé au re-sync.
      # Démo : DSN Mailtrap sandbox → smtp://USER:PASS@sandbox.smtp.mailtrap.io:2525
      # Non défini : Symfony retombe sur null://null (mails ignorés, notifs in-app OK).
      - key: MAILER_DSN
        sync: false
      # Mettre à 1 pour le PREMIER déploiement (seed des comptes de test + données démo),
      # puis remettre à 0 : les fixtures purgent la base à chaque exécution.
      - key: APP_LOAD_FIXTURES
        value: "0"
