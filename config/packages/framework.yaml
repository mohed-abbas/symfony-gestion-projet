# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

    # Client HTTP scopé pour l'API IA (Groq). Clé injectée depuis .env.local.
    http_client:
        scoped_clients:
            groq.client:
                base_uri: '%env(GROQ_API_BASE_URL)%'
                auth_bearer: '%env(GROQ_API_KEY)%'
                timeout: 30

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
