name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint, PHPStan & tests
    runs-on: ubuntu-latest

    # DATABASE_URL pointe la base de base `app` ; l'env test ajoute le suffixe `_test` (app_test).
    env:
      APP_ENV: test
      DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/app?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
      MAILER_DSN: "null://null"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, pdo_pgsql, zip, opcache
          coverage: none
          tools: composer:v2

      - name: Provide .env
        run: cp .env.example .env

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # PHPStan (extension Symfony) lit le conteneur compilé en dev.
      - name: Warm up dev cache
        run: php bin/console cache:warmup --env=dev

      - name: Lint container
        run: php bin/console lint:container

      - name: Lint Twig
        run: php bin/console lint:twig templates

      - name: Lint YAML
        run: php bin/console lint:yaml config --parse-tags

      - name: PHPStan
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

      - name: Create test database
        run: php bin/console --env=test doctrine:database:create --if-not-exists

      - name: Run migrations
        run: php bin/console --env=test doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: Set up Messenger transports
        run: php bin/console --env=test messenger:setup-transports

      - name: PHPUnit
        run: php bin/phpunit
